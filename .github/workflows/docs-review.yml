# Generated by @farming-labs/docs. You can edit this file.
name: Docs Review

on:
  pull_request:
    paths:
      - "website/docs.config.tsx"
      - "website/docs/**"
      - "website/app/docs/**"
      - "website/src/app/docs/**"
      - "website/content/docs/**"
      - "website/src/content/docs/**"
      - "website/src/lib/docs.config.*"
      - ".github/workflows/docs-review.yml"

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  docs-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs CLI
        run: pnpm --filter @farming-labs/docs run build

      - name: Review docs
        run: node ../packages/docs/dist/cli/index.mjs review --ci --config docs.config.tsx
        working-directory: website
