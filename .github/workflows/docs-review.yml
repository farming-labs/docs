# Generated by @farming-labs/docs. You can edit this file.
name: Docs Review

on:
  pull_request:
    paths:
      - "website/docs.config.tsx"
      - "website/docs/**"
      - "website/app/docs/**"
      - "website/src/app/docs/**"
      - "website/content/docs/**"
      - "website/src/content/docs/**"
      - "website/src/lib/docs.config.*"
      - ".github/workflows/docs-review.yml"
      - ".github/workflows/docs-review-reusable.yml"

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  docs-review:
    name: "docs-review"
    uses: ./.github/workflows/docs-review-reusable.yml
    with:
      check-name: "docs-review"
      config: "docs.config.tsx"
      working-directory: "website"
      package-manager: "pnpm"
      build-command: "pnpm --filter @farming-labs/docs run build"
      review-command: "node ../packages/docs/dist/cli/index.mjs"
    permissions:
      contents: read
      checks: write
      pull-requests: write
