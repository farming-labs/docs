          deprecated: true
          description: Deprecated. Use `to` instead.
          items:
            example: ctc_01jxwtp1vse91twb5bj977gav9
            format: id
            type: string
          type: array
          x-stainless-deprecation-message: Use `to` to specify recipients instead.
        from:
          description: >-
            The phone number from which to send the blast. This can be either
            the phone number in E.164 format or a Surge phone number id. If not
            provided, the account's default phone number is used.
          example: '+18015552345'
          pattern: ^\+[1-9]\d{6,14}$|^\d{5,6}$|^pn_[[:alnum:]]{26}$
          type: string
        name:
          description: Optional name for the blast.
          type: string
        segments:
          deprecated: true
          description: Deprecated. Use `to` with audience IDs instead.
          items:
            example: aud_01jxwtwzqhfykb31dt6mvpsa9k
            format: id
            type: string
          type: array
          x-stainless-deprecation-message: >-
            Use `to` with audience IDs (`aud_...`) to specify audience
            recipients instead.
        send_at:
          description: When to send the blast. If not provided, sends immediately.
          format: date-time
          type: string
        to:
          description: >-
            List of recipients to whom the blast should be sent. This can be a
            combination of contact IDs, audience IDs, and phone numbers.
          items:
            oneOf:
              - example: ctc_01jxwtp1vse91twb5bj977gav9
                format: id
                type: string
              - example: aud_01jxwtwzqhfykb31dt6mvpsa9k
                format: id
                type: string
              - example: '+18015551234'
                format: phone-number
                pattern: ^\+[1-9]\d{6,14}$
                type: string
          type: array
      required: []
      title: BlastParams
      type: object
    Message:
      description: A Message is a communication sent to a Contact.
      example:
        attachments:
          - id: att_01j9e0m1m6fc38gsv2vkfqgzz2
            type: image
            url: https://api.surge.app/attachments/att_01jbwyqj7rejzat7pq03r7fgmf
        blast_id: null
        body: Thought you could leave without saying goodbye?
        conversation:
          contact:
            first_name: Dominic
            id: ctc_01j9dy8mdzfn3r0e8x1tbdrdrf
            last_name: Toretto
            phone_number: '+18015551234'
          id: cnv_01j9e0dgmdfkj86c877ws0znae
          phone_number:
            id: pn_01jsjwe4d9fx3tpymgtg958d9w
            number: '+18015552345'
            type: local
        id: msg_01j9e0m1m6fc38gsv2vkfqgzz2
        metadata:
          external_id: '12345'
      properties:
        attachments:
          items:
            $ref: '#/components/schemas/Attachment'
          type: array
        blast_id:
          description: >-
            The ID of the blast this message belongs to, if any. This can be
            used to attribute messages back to a specific blast.
          type:
            - string
            - 'null'
        body:
          description: The message body.
          type:
            - string
            - 'null'
        conversation:
          $ref: '#/components/schemas/Conversation'
        id:
          description: Unique identifier for the object.
          type: string
        metadata:
          $ref: '#/components/schemas/Metadata'
      title: Message
      type: object
    PhoneNumber:
      description: A phone number that can be used to send and receive messages and calls
      example:
        campaign_id: cpn_01jjnn7s0zfx5tdcsxjfy93et2
        id: pn_01jsjwe4d9fx3tpymgtg958d9w
        name: (801) 555-1234
        number: '+18015551234'
        type: local
      properties:
        campaign_id:
          description: >-
            The unique identifier of the campaign this phone number is attached
            to, if any
          type:
            - string
            - 'null'
        id:
          description: Unique identifier for the phone number
          type: string
        name:
          description: A human-readable name for the phone number
          type:
            - string
            - 'null'
        number:
          description: The phone number in E.164 format
          example: '+18015551234'
          format: phone-number
          pattern: ^\+[1-9]\d{6,14}$
          type: string
        type:
          description: Whether the phone number is local, toll-free, or short code
          enum:
            - local
            - short_code
            - toll_free
          type: string
      required:
        - id
        - name
        - number
        - type
        - campaign_id
      title: PhoneNumber
      type: object
    ContactOptedOutEvent:
      description: ''
      example:
        account_id: acct_01japd271aeatb7txrzr2xj8sg
        data:
          id: ctc_01ja88cboqffhswjx8zbak3ykk
        timestamp: '2024-10-21T23:29:41Z'
        type: contact.opted_out
      properties:
        account_id:
          description: The ID of the account in which this event occurred
          type: string
        data:
          description: The data associated with the event
          properties:
            id:
              description: The unique identifier for the contact
              type: string
          required:
            - id
          type: object
        timestamp:
          description: The timestamp when this event occurred, in ISO8601 format
          format: date-time
          type: string
        type:
          const: contact.opted_out
          description: The type of the event. Always `contact.opted_out` for this event.
          type: string
      required:
        - account_id
