            - exhausted
            - expired
            - already_verified
          type: string
        verification:
          $ref: '#/components/schemas/Verification'
      title: VerificationCheck
      type: object
    OrganizationParams:
      description: >-
        Parameters describing the legal entity on whose behalf the account will
        be operated.
      properties:
        address:
          description: The address of the organization's headquarters.
          properties:
            country:
              description: >-
                The two character ISO 3166 country code. If none is provided,
                the organization's country code will be used.
              nullable: true
              type: string
            line1:
              description: >-
                The first line of the address, typically the number and street
                name
              nullable: true
              type: string
            line2:
              description: >-
                The second line of the address if needed, typically an apartment
                or suite number
              nullable: true
              type: string
            locality:
              description: The city or locality
              nullable: true
              type: string
            name:
              description: >-
                The name to which any mail should be addressed. If none is
                provided, this will default to the organization's
                registered_name
              nullable: true
              type: string
            postal_code:
              description: The postal code
              nullable: true
              type: string
            region:
              description: The state or region
              nullable: true
              type: string
          type: object
        contact:
          description: >-
            An object representing an individual who can be contacted if Surge
            or our carrier partners have any questions about the business. If
            you are registering on behalf of your customer, this must be a
            contact from your customer's company rather than your own. The
            individual will likely never be contacted unless there are issues
            with spam.
          nullable: true
          properties:
            email:
              description: >-
                An email address at which the individual can be reached.
                Typically an email using the same domain name as the website URL
                will be preferred (e.g. with a website domain of
                `https://dtprecisionauto.com`, an email like
                `dom@dtprecisionauto.com` will be preferred over one like
                `dom@anothergarage.com` or `dom.toretto@gmail.com`.
                `dtprecisionauto@gmail.com` would also be acceptable, but not
                preferred)
              format: email
              nullable: true
              type: string
            first_name:
              description: The first name (or given name) of the individual
              nullable: true
              type: string
            last_name:
              description: The last name (or family name) of the individual
              nullable: true
              type: string
            phone_number:
              description: >-
                A phone number at which the individual can be reached (E.164
                format)
              nullable: true
              type: string
            title:
              description: The job title of the individual.
              enum:
                - ceo
                - cfo
                - director
                - gm
                - vp
                - general_counsel
                - other
              nullable: true
              type: string
            title_other:
              description: >-
                If `other` is provided for the `title` field, this field should
                be used to provide the title of the individual
              nullable: true
              type: string
          type: object
        country:
          description: >-
            The two character ISO 3166 country code for the country in which the
            organization is headquartered.
          nullable: true
          type: string
        email:
          description: >-
            For publicly traded companies, an email for a representative of the
            company to whom a verification email will be sent. This must be an
            email on the same domain as the company's website (e.g. with a
            website domain of `https://dtprecisionauto.com`, the email must use
            the same `@dtprecisionauto.com`)
          format: email
          nullable: true
          type: string
        identifier:
          description: >-
            The value of the identifier whose type is specified in the
            identifier_type field. For EIN, can be formatted with or without the
            hyphen. For CBN, must be exactly 9 digits.
          nullable: true
          type: string
        identifier_type:
          description: >-
            The type of identifier being provided for the organization. Use
            "ein" for US businesses or "cbn" for Canadian businesses.
          enum:
            - ein
            - cbn
          nullable: true
          type: string
        industry:
          description: The industry in which the organization operates.
          enum:
            - agriculture
            - automotive
            - banking
            - construction
            - consumer
            - education
            - electronics
            - energy
            - engineering
            - fast_moving_consumer_goods
            - financial
            - fintech
            - food_and_beverage
            - government
            - healthcare
            - hospitality
            - insurance
            - jewelry
            - legal
            - manufacturing
            - media
            - not_for_profit
            - oil_and_gas
            - online
            - professional_services
            - raw_materials
            - real_estate
            - religion
            - retail
            - technology
            - telecommunications
            - transportation
            - travel
          nullable: true
          type: string
        mobile_number:
          description: >-
            For sole proprietors, this must be a valid US or Canadian mobile
            phone number to which a verification text message will be sent.
            (E.164 format)
          nullable: true
          type: string
        regions_of_operation:
          description: An array of regions in which the organization operates.
          items:
            enum:
              - africa
              - asia
              - australia
              - europe
              - latin_america
              - usa_and_canada
            type: string
          nullable: true
          type: array
        registered_name:
          description: >-
            The legal name of the organization as registered with the IRS or
            other relevant authorities. For some applications, this will be
            matched against government records and should include all
            punctuation and everything else as well.
          nullable: true
          type: string
        stock_exchange:
          description: >-
            For publicly traded companies, this is the exchange on which the
            company's stock is traded.
          enum:
            - amex
            - amx
            - asx
            - b3
            - bme
            - bse
            - fra
            - icex
            - jpx
            - jse
            - krx
            - lon
            - nasdaq
            - none
            - nyse
            - nse
            - omx
            - other
            - sehk
            - sgx
            - sse
            - sto
            - swx
            - szse
            - tsx
            - twse
            - vse
          nullable: true
          type: string
        stock_symbol:
          description: >-
            For publicly traded companies, the ticker symbol for the company's
            stock
          nullable: true
          type: string
        type:
          description: The type of organization
          enum:
            - co_op
            - government
            - llc
            - non_profit
            - partnership
            - private_corporation
            - public_corporation
            - sole_proprietor
          nullable: true
          type: string
        website:
          description: >-
            The URL of the website for this organization. The website should be
            publicly available, clearly reflect the organization's purpose, and
            the URL should start with `https://`
          nullable: true
          type: string
      title: OrganizationParams
      type: object
    AccountParams:
      description: Parameters for creating a new account.
      example:
        brand_name: DT Precision Auto
        name: 'Account #2840 - DT Precision Auto'
        organization:
          address:
            country: US
            line1: 2640 Huron St
            line2: null
            locality: Los Angeles
            name: DT Precision Auto
            postal_code: '90065'
            region: CA
          contact:
            email: dom@dtprecisionauto.com
            first_name: Dominic
            last_name: Toretto
            phone_number: '+13235556439'
            title: other
            title_other: Owner
          country: US
          email: dom@dtprecisionauto.com
          identifier: '123456789'
          identifier_type: ein
          industry: automotive
          mobile_number: '+13235556439'
          regions_of_operation:
            - usa_and_canada
          registered_name: DT Precision Auto LLC
          stock_exchange: null
          stock_symbol: null
          type: llc
          website: https://dtprecisionauto.com
        time_zone: America/Los_Angeles
      properties:
        brand_name:
          description: >-
            The name by which the people this account communicates with know it.
            If not provided, this will match the name field.
          nullable: true
          type: string
        name:
          description: >-
            The name of the account that will be visible for your internal
            organizational purposes. This will also be the default public-facing
            brand name unless you also set a `brand_name`, but otherwise the
            account name will never be displayed anywhere outside of Surge HQ,
            and may include your ID for the account or anything else that may
            help you.
          type: string
        organization:
          $ref: '#/components/schemas/OrganizationParams'
        time_zone:
          description: >-
            This is the time zone in which the account is headquartered. This
            time zone may be used for compliance with TCPA restrictions on when
            messages may be sent.
          example: America/Los_Angeles
          type: string
      required:
        - name
      title: AccountParams
      type: object
    ContactParams:
      description: Parameters for creating a contact
      example:
        email: dom@toretto.family
        first_name: Dominic
        last_name: Toretto
        metadata:
          car: 1970 Dodge Charger R/T
        phone_number: '+18015551234'
      properties:
        email:
          description: The contact's email address.
          format: email
          type: string
        first_name:
          description: The contact's first name.
          type: string
        last_name:
          description: The contact's last name.
          type: string
        metadata:
          $ref: '#/components/schemas/Metadata'
        phone_number:
          description: The contact's phone number in E.164 format.
          example: '+18015551234'
          format: phone-number
          pattern: ^\+[1-9]\d{6,14}$
          type: string
      required:
        - phone_number
      title: ContactParams
      type: object
    MessageParams:
      description: >-
        Payload for creating a message. Either an attachment or the body must be
        given. You can specify the recipient either using the 'conversation'
        parameter or the 'to'/'from' parameters, but not both.
      example:
        attachments:
          - url: https://toretto.family/coronas.gif
        body: Thought you could leave without saying goodbye?
        conversation:
          contact:
            first_name: Dominic
            last_name: Toretto
            phone_number: '+18015551234'
        metadata:
          external_id: '12345'
      oneOf:
        - description: >-
            Create a message while including parameters for the conversation in
            which the message should be sent.
          properties:
            attachments:
              items:
                $ref: '#/components/schemas/AttachmentParams'
              type: array
            body:
              description: The message body.
              type: string
            conversation:
              $ref: '#/components/schemas/ConversationParams'
            metadata:
              $ref: '#/components/schemas/Metadata'
            send_at:
              description: >-
                An optional datetime for scheduling message up to a couple of
                months in the future.
              format: date-time
              type: string
          required:
            - conversation
          title: MessageParamsWithConversation
          type: object
        - description: Create a basic message by specifying just the to/from phone numbers.
          properties:
            attachments:
              items:
                $ref: '#/components/schemas/AttachmentParams'
              type: array
            body:
              description: The message body.
              type: string
            from:
              description: >-
                The sender's phone number in E.164 format or phone number ID. If
                omitted, uses the account's default phone number. Cannot be used
                together with 'conversation'.
              example: '+18015552345'
              pattern: ^\+[1-9]\d{6,14}$|^\d{5,6}$|^pn_[[:alnum:]]{26}$
              type: string
            metadata:
              $ref: '#/components/schemas/Metadata'
            send_at:
              description: >-
                An optional datetime for scheduling message up to a couple of
                months in the future.
              format: date-time
              type: string
            to:
              description: >-
                The recipient's phone number in E.164 format. Cannot be used
                together with 'conversation'.
              example: '+18015551234'
              format: phone-number
              pattern: ^\+[1-9]\d{6,14}$
              type: string
          required:
            - to
          title: SimpleMessageParams
          type: object
      properties: {}
      title: MessageParams
      type: object
    ErrorResponse:
      description: An error response
      example:
        error:
          message: The requested resource could not be found.
          type: not_found
      properties:
        error:
          $ref: '#/components/schemas/Error'
      required:
        - error
      title: ErrorResponse
      type: object
    PhoneNumberPurchaseParams:
      description: >
        Parameters for purchasing a new phone number. The system will
        automatically infer the type in certain cases:

        - If only area_code is provided, type is inferred from the area code

        - If only latitude/longitude are provided, type is inferred as 'local'

        - Otherwise, type must be explicitly specified
      examples:
        - description: Purchase any available local number
          summary: Random local number
          value:
            type: local
        - description: Purchase any available toll-free number
          summary: Random toll-free number
          value:
            type: toll_free
        - description: Purchase a number from area code 801
          summary: Number from area code
          value:
            area_code: '801'
        - description: Purchase a local number near New York City
          summary: Local number near coordinates
          value:
            latitude: 40.7128
            longitude: -74.006
      properties:
        area_code:
          description: >-
            The desired area code for this phone number. If provided without
            type, the type will be inferred.
          example: '801'
          pattern: ^\d{3}$
          type: string
        latitude:
          description: >-
            Latitude to search for nearby phone numbers. Must be used with
            longitude. If provided without type, type will be inferred as
            'local'.
          example: 40.7128
          maximum: 90
          minimum: -90
          type: number
        longitude:
          description: >-
            Longitude to search for nearby phone numbers. Must be used with
            latitude. If provided without type, type will be inferred as
            'local'.
          example: -74.006
          maximum: 180
          minimum: -180
          type: number
        name:
          description: >-
            A human-readable name for the phone number. If not provided,
            defaults to the formatted phone number.
          example: Support Line
          type: string
        type:
          description: >-
            Whether the phone number is local or toll-free. Can be omitted if
            area_code or latitude/longitude are provided.
          enum:
            - local
            - toll_free
          example: local
          type: string
      required: []
      title: PhoneNumberPurchaseParams
      type: object
    StandardCampaignParams:
      description: Full campaign details for standard registration through Surge
      example:
        consent_flow: >-
          When customers bring in their car for service, they will fill out this
          web form for intake: https://fastauto.shop/bp108c In it they can
          choose to opt in to text message notifications. If they choose to opt
          in, we will send them notifications to let them know if our mechanics
          find issues and once the car is ready to go, as well as links to
          invoices and to leave us feedback.
        description: >-
          This phone number will send auto maintenance notifications to end
          users that have opted in. It will also be used for responding to
          customer inquiries and sending some marketing offers.
        includes:
          - links
          - phone_numbers
        link_sample: https://l.fastauto.shop/s034ij
        message_samples:
          - >-
            You are now opted in to receive repair notifications from DT
            Precision Auto. Frequency varies. Msg&data rates apply. Reply STOP
            to opt out.
          - >-
            You're lucky that hundred shot of NOS didn't blow the welds on the
            intake!
          - >-
            Your car is ready to go. See your invoice here:
            https://l.fastauto.shop/s034ij
        privacy_policy_url: https://fastauto.shop/sms-privacy
        terms_and_conditions_url: https://fastauto.shop/terms-and-conditions
        use_cases:
          - account_notification
          - customer_care
          - marketing
        volume: high
      properties:
        consent_flow:
          description: >-
            A string explaining the method through which end users will opt in
            to receive messages from the brand. Typically this should include
            URLs for opt-in forms or screenshots that might be helpful in
            explaining the flow to someone unfamiliar with the organization's
            purpose.
          maxLength: 4096
          minLength: 40
          type: string
        description:
          description: >-
            An explanation of the organization's purpose and how it will be
            using text messaging to accomplish that purpose.
          maxLength: 4096
          minLength: 40
          type: string
        includes:
          description: >
            A list of properties that this campaign should include. These
            properties can be any of the following values:


            - `links` - whether the campaign might send links in messages

            - `phone_numbers` - whether the campaign might send phone numbers in
            messages

            - `age_gated` - whether the campaign contains age gated content
            (controlled substances or adult content)

            - `direct_lending` - whether the campaign contains content related
            to direct lending or other loan arrangements
          items:
            enum:
              - links
              - phone_numbers
              - age_gated
              - direct_lending
            type: string
          type: array
          uniqueItems: true
        link_sample:
          description: >-
            A sample link that might be sent by this campaign. If links from
            other domains are sent through this campaign, they are much more
            likely to be filtered by the carriers. If link shortening is enabled
            for the account, the link shortener URL will be used instead of what
            is provided. Reach out to support if you would like to disable
            automatic link shortening.
          format: uri
          maxLength: 255
          type: string
        message_samples:
          description: >-
            An array of 2-5 strings with examples of the messages that will be
            sent from this campaign. Typically the first sample should be a
            compliance message like `You are now opted in to messages from
            {brand name}. Frequency varies. Msg&data rates apply. Reply STOP to
            opt out.` These samples don't necessarily need to be the only
            templates that will be used for the campaign, but they should
            reflect the purpose of the messages that will be sent. Any variable
            content can be reflected by wrapping it in square brackets like
            `[customer name]`.
          items:
            maxLength: 1024
            minLength: 20
            type: string
          maxItems: 5
          minItems: 2
          type: array
        privacy_policy_url:
          description: >-
            The URL of the privacy policy for the brand in question. This may be
            a shared privacy policy if it's the policy that is displayed to end
            users when they opt in to messaging.
          format: uri
          maxLength: 255
          type: string
        terms_and_conditions_url:
          description: >-
            The URL of the terms and conditions presented to end users when they
            opt in to messaging. These terms and conditions may be shared among
            all of a platform's customers if they're the terms that are
            presented to end users when they opt in to messaging.
          format: uri
          maxLength: 255
          type: string
        use_cases:
          description: >
            A list containing 1-5 types of messages that will be sent with this
            campaign.


            The following use cases are typically available to all brands:


            - `account_notification` - For sending reminders, alerts, and
            general account-related notifications like booking confirmations or
            appointment reminders.

            - `customer_care` - For account support, troubleshooting, and
            general customer service communication.

            - `delivery_notification` - For notifying customers about the status
            of product or service deliveries.

            - `fraud_alert` - For warning customers about suspicious or
            potentially fraudulent activity.

            - `higher_education` - For messaging related to colleges,
            universities, and school districts outside of K–12.

            - `marketing` - For promotional or advertising messages intended to
            market products or services.

            - `polling_voting` - For conducting surveys, polls, or
            voting-related messaging.

            - `public_service_announcement` - For raising awareness about social
            issues or important public information.

            - `security_alert` - For alerts related to potential security
            breaches or compromised systems requiring user action.

            - `two_factor_authentication` - For sending one-time passwords or
            verification codes for login or password reset.


            For access to special use cases not shown here, reach out to
            support@surge.app.
          items:
            enum:
              - account_notification
              - customer_care
              - delivery_notification
              - fraud_alert
              - higher_education
              - marketing
              - polling_voting
              - public_service_announcement
              - security_alert
              - two_factor_authentication
            type: string
          maxItems: 5
          minItems: 1
          type: array
        volume:
          description: >
            This will be one of the following:


            - `low` - The campaign will be allowed to send up to 2000 SMS
            segments to T-Mobile customers each day. In this case your platform
            will be charged for the setup fee for a low volume number upon
            receipt of the API request.

            - `high` - The campaign will be allowed to send up to 200k SMS
            segments to T-Mobile customers each day, depending on the trust
            score assigned by The Campaign Registry. Your platform will be
            charged for the setup fee for a high volume number upon receipt of
            the API request, and phone numbers will be charged as high volume
            numbers going forward.
          enum:
            - high
            - low
          type: string
      required:
        - consent_flow
        - description
        - message_samples
        - privacy_policy_url
        - terms_and_conditions_url
        - use_cases
        - volume
      title: StandardCampaignParams
      type: object
    Metadata:
      additionalProperties:
        maxLength: 500
        type: string
      description: Set of key-value pairs that will be stored with the object.
      maxProperties: 50
      properties: {}
      title: Metadata
      type: object
    VerificationParams:
      description: Parameters for creating a Verification
      example:
        phone_number: '+18015551234'
      properties:
        phone_number:
          description: The phone number to be verified. In E.164 format.
          example: '+18015551234'
          format: phone-number
          pattern: ^\+[1-9]\d{6,14}$
          type: string
      required:
        - phone_number
      title: VerificationParams
      type: object
    UserList:
      description: A paginated list of users
      properties:
        data:
          description: The list of users
          items:
            $ref: '#/components/schemas/User'
          type: array
        pagination:
          $ref: '#/components/schemas/Pagination'
      required:
        - data
        - pagination
      title: UserList
      type: object
    Pagination:
      description: Cursor-based pagination information
      example:
        next_cursor: g3QAAAABZAACaWRtAAAAGnBuXzAxamtzY2s5eDdkeW0wZnBxZjdjYmRyeQ==
        previous_cursor: null
      properties:
        next_cursor:
          description: Cursor for the next page of results. Null if there is no next page.
          type:
            - string
            - 'null'
        previous_cursor:
          description: >-
            Cursor for the previous page of results. Null if there is no
            previous page.
          type:
            - string
            - 'null'
      title: Pagination
      type: object
    Audience:
      description: A group of contacts used for targeting messages.
      example:
        id: aud_01j9dy8mdzfn3r0e8x1tbdrdrf
        name: The Family
      properties:
        id:
          description: Unique identifier for the object.
          type: string
        name:
          description: >-
            A name to identify this Audience. This name will only be visible
            within Surge.
          maxLength: 255
          type: string
      required:
        - id
        - name
      title: Audience
      type: object
    Recording:
      description: A call recording
      example:
        call:
          contact:
            email: dom@toretto.family
            first_name: Dominic
            id: ctc_01ja88cboqffhswjx8zbak3ykk
            last_name: Toretto
            metadata:
              car: 1970 Dodge Charger R/T
            phone_number: '+18015551234'
          duration: 184
          id: call_01jjnn7s0zfx5tdcsxjfy93et2
          initiated_at: '2025-03-31T21:01:37Z'
          status: completed
        duration: 124
        id: rec_01kfyc9dgdec1avkgs7tng8htg
      properties:
        call:
          description: The call that produced this recording
          properties:
            contact:
              $ref: '#/components/schemas/Contact'
            duration:
              description: The duration of the call in seconds
              type: integer
            id:
              description: The unique identifier for the call
              type: string
            initiated_at:
              description: When the call was initiated
              format: date-time
              type: string
            status:
              description: The status of the call
              enum:
                - busy
                - canceled
                - completed
                - failed
                - in_progress
                - missed
                - no_answer
                - queued
                - ringing
              type: string
          required:
            - id
            - contact
            - duration
            - initiated_at
            - status
          type: object
        duration:
          description: The duration of the recording in seconds
          type: integer
        id:
          description: The unique identifier for the recording
          type: string
      required:
        - id
        - duration
        - call
      title: Recording
      type: object
    ExternalCampaignParams:
      description: >-
        Import an externally registered campaign from The Campaign Registry
        (TCR)
      example:
        tcr_id: CABCDE1
      properties:
        tcr_id:
          description: >-
            The Campaign Registry (TCR) ID for the externally registered
            campaign
          example: CABCDE1
          maxLength: 7
          minLength: 7
          pattern: ^C[A-Z0-9]{6}$
          type: string
      required:
        - tcr_id
      title: ExternalCampaignParams
      type: object
    MessageList:
      description: A paginated list of messages
      example:
        data:
          - attachments: []
            blast_id: null
            body: Thought you could leave without saying goodbye?
            conversation:
              contact:
                first_name: Dominic
                id: ctc_01j9dy8mdzfn3r0e8x1tbdrdrf
                last_name: Toretto
                phone_number: '+18015551234'
              id: cnv_01j9e0dgmdfkj86c877ws0znae
              phone_number:
                id: pn_01jsjwe4d9fx3tpymgtg958d9w
                number: '+18015552345'
                type: local
            id: msg_01j9e0m1m6fc38gsv2vkfqgzz2
        pagination:
          next_cursor: null
          previous_cursor: null
      properties:
        data:
          description: The list of messages
          items:
            $ref: '#/components/schemas/Message'
          type: array
        pagination:
          $ref: '#/components/schemas/Pagination'
      required:
        - data
        - pagination
      title: MessageList
      type: object
    CallEndedEvent:
      description: ''
      example:
        account_id: acct_01japd271aeatb7txrzr2xj8sg
        data:
          contact:
            email: dom@toretto.family
            first_name: Dominic
            id: ctc_01ja88cboqffhswjx8zbak3ykk
            last_name: Toretto
            metadata:
              car: 1970 Dodge Charger R/T
            phone_number: '+18015551234'
          duration: 184
          id: call_01jjnn7s0zfx5tdcsxjfy93et2
          initiated_at: '2025-03-31T21:01:37Z'
          status: completed
        timestamp: '2024-10-21T23:29:41Z'
        type: call.ended
      properties:
        account_id:
          description: The ID of the account in which this event occurred
          type: string
        data:
          description: The data associated with the event
          properties:
            contact:
              $ref: '#/components/schemas/Contact'
            duration:
              description: The duration of the call in seconds
              type: integer
            id:
              description: The unique identifier for the call
              type: string
            initiated_at:
              description: When the call was initiated
              format: date-time
              type: string
            status:
              description: The status of the call
              enum:
                - busy
                - canceled
                - completed
                - failed
                - in_progress
                - missed
                - no_answer
                - queued
                - ringing
              type: string
          required:
            - id
            - contact
            - duration
            - initiated_at
            - status
          type: object
        timestamp:
          description: The timestamp when this event occurred, in ISO8601 format
          format: date-time
          type: string
        type:
          const: call.ended
          description: The type of the event. Always `call.ended` for this event.
          type: string
      required:
        - account_id
        - data
        - timestamp
        - type
      title: CallEndedEvent
      type: object
    Contact:
      description: A contact who has consented to receive messages
      example:
        email: dom@toretto.family
        first_name: Dominic
        id: ctc_01j9dy8mdzfn3r0e8x1tbdrdrf
        last_name: Toretto
        metadata:
          car: 1970 Dodge Charger R/T
        phone_number: '+18015551234'
      properties:
        email:
          description: The contact's email address.
          format: email
          type: string
        first_name:
          description: The contact's first name.
          type: string
        id:
          description: Unique identifier for the object.
          type: string
        last_name:
          description: The contact's last name.
          type: string
        metadata:
          $ref: '#/components/schemas/Metadata'
        phone_number:
          description: The contact's phone number in E.164 format.
          example: '+18015551234'
          format: phone-number
          pattern: ^\+[1-9]\d{6,14}$
          type: string
      required:
        - id
        - phone_number
      title: Contact
      type: object
    Campaign:
      description: >-
        A campaign represents the context in which one or more of your phone
        numbers communicates with your contacts. Consent and opt-outs are tied
        to the campaign.
      example:
        consent_flow: >-
          When customers bring in their car for service, they will fill out this
          web form for intake: https://fastauto.shop/bp108c In it they can
          choose to opt in to text message notifications. If they choose to opt
          in, we will send them notifications to let them know if our mechanics
          find issues and once the car is ready to go, as well as links to
          invoices and to leave us feedback.
        description: >-
          This phone number will send auto maintenance notifications to end
          users that have opted in. It will also be used for responding to
          customer inquiries and sending some marketing offers.
        id: cpn_01k0qczvhbet4azgn5xm2ccfst
        includes:
          - links
          - phone_numbers
        link_sample: https://l.fastauto.shop/s034ij
        message_samples:
          - >-
            You are now opted in to receive repair notifications from DT
            Precision Auto. Frequency varies. Msg&data rates apply. Reply STOP
            to opt out.
          - >-
            You're lucky that hundred shot of NOS didn't blow the welds on the
            intake!
          - >-
            Your car is ready to go. See your invoice here:
            https://l.fastauto.shop/s034ij
        privacy_policy_url: https://fastauto.shop/sms-privacy
        status: pending
        terms_and_conditions_url: https://fastauto.shop/terms-and-conditions
        use_cases:
          - account_notification
          - customer_care
          - marketing
        volume: high
      properties:
        consent_flow:
          description: >-
            A string explaining the method through which end users will opt in
            to receive messages from the brand. Typically this should include
            URLs for opt-in forms or screenshots that might be helpful in
            explaining the flow to someone unfamiliar with the organization's
            purpose.
          maxLength: 4096
          minLength: 40
          type: string
        description:
          description: >-
            An explanation of the organization's purpose and how it will be
            using text messaging to accomplish that purpose.
          maxLength: 4096
          minLength: 40
          type: string
        id:
          description: The campaign ID
          type: string
        includes:
          description: >
            A list of properties that this campaign should include. These
            properties can be any of the following values:


            - `links` - whether the campaign might send links in messages

            - `phone_numbers` - whether the campaign might send phone numbers in
            messages

            - `age_gated` - whether the campaign contains age gated content
            (controlled substances or adult content)

            - `direct_lending` - whether the campaign contains content related
            to direct lending or other loan arrangements
          items:
            enum:
              - links
              - phone_numbers
              - age_gated
              - direct_lending
            type: string
          type: array
          uniqueItems: true
        link_sample:
          description: >-
            A sample link that might be sent by this campaign. If links from
            other domains are sent through this campaign, they are much more
            likely to be filtered by the carriers. If link shortening is enabled
            for the account, the link shortener URL will be used instead of what
            is provided. Reach out to support if you would like to disable
            automatic link shortening.
          format: uri
          maxLength: 255
          type: string
        message_samples:
          description: >-
            An array of 2-5 strings with examples of the messages that will be
            sent from this campaign. Typically the first sample should be a
            compliance message like `You are now opted in to messages from
            {brand name}. Frequency varies. Msg&data rates apply. Reply STOP to
            opt out.` These samples don't necessarily need to be the only
            templates that will be used for the campaign, but they should
            reflect the purpose of the messages that will be sent. Any variable
            content can be reflected by wrapping it in square brackets like
            `[customer name]`.
          items:
            maxLength: 1024
            minLength: 20
            type: string
          maxItems: 5
          minItems: 2
          type: array
        privacy_policy_url:
          description: >-
            The URL of the privacy policy for the brand in question. This may be
            a shared privacy policy if it's the policy that is displayed to end
            users when they opt in to messaging.
          format: uri
          maxLength: 255
          type: string
        status:
          description: The current status of the campaign.
          enum:
            - active
            - canceled
            - created
            - deactivated
            - in_review
            - rejected
          type: string
        terms_and_conditions_url:
          description: >-
            The URL of the terms and conditions presented to end users when they
            opt in to messaging. These terms and conditions may be shared among
            all of a platform's customers if they're the terms that are
            presented to end users when they opt in to messaging.
          format: uri
          maxLength: 255
          type: string
        use_cases:
          description: >
            A list containing 1-5 types of messages that will be sent with this
            campaign.


            The following use cases are typically available to all brands:


            - `account_notification` - For sending reminders, alerts, and
            general account-related notifications like booking confirmations or
            appointment reminders.

            - `customer_care` - For account support, troubleshooting, and
            general customer service communication.

            - `delivery_notification` - For notifying customers about the status
            of product or service deliveries.

            - `fraud_alert` - For warning customers about suspicious or
            potentially fraudulent activity.

            - `higher_education` - For messaging related to colleges,
            universities, and school districts outside of K–12.

            - `marketing` - For promotional or advertising messages intended to
            market products or services.

            - `polling_voting` - For conducting surveys, polls, or
            voting-related messaging.

            - `public_service_announcement` - For raising awareness about social
            issues or important public information.

            - `security_alert` - For alerts related to potential security
            breaches or compromised systems requiring user action.

            - `two_factor_authentication` - For sending one-time passwords or
            verification codes for login or password reset.


            For access to special use cases not shown here, reach out to
            support@surge.app.
          items:
            enum:
              - account_notification
              - customer_care
              - delivery_notification
              - fraud_alert
              - higher_education
              - marketing
              - polling_voting
              - public_service_announcement
              - security_alert
              - two_factor_authentication
            type: string
          maxItems: 5
          minItems: 1
          type: array
        volume:
          description: >
            This will be one of the following:


            - `low` - The campaign will be allowed to send up to 2000 SMS
            segments to T-Mobile customers each day. In this case your platform
            will be charged for the setup fee for a low volume number upon
            receipt of the API request.

            - `high` - The campaign will be allowed to send up to 200k SMS
            segments to T-Mobile customers each day, depending on the trust
            score assigned by The Campaign Registry. Your platform will be
            charged for the setup fee for a high volume number upon receipt of
            the API request, and phone numbers will be charged as high volume
            numbers going forward.
          enum:
            - high
            - low
          type: string
      required:
        - consent_flow
        - description
        - id
        - includes
        - message_samples
        - privacy_policy_url
        - status
        - use_cases
        - volume
      title: Campaign
      type: object
  securitySchemes:
    authorization:
      bearerFormat: Surge API token
      scheme: bearer
      type: http
info:
  title: Surge
  version: '1.0'
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
openapi: 3.1.1
paths:
  /accounts:
    post:
      description: Creates a new Account within the calling Platform.
      operationId: CreateAccount
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountParams'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
          description: Created account
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error
      summary: Create an account
      tags:
        - Accounts
      x-codeSamples:
        - lang: JavaScript
          source: >-
            import Surge from '@surgeapi/node';


            const client = new Surge({
              apiKey: process.env['SURGE_API_KEY'], // This is the default and can be omitted
            });


            const account = await client.accounts.create({ name: 'Account #2840
            - DT Precision Auto' });


            console.log(account.id);
        - lang: Python
          source: |-
            import os
            from surge import Surge

            client = Surge(
                api_key=os.environ.get("SURGE_API_KEY"),  # This is the default and can be omitted
            )
            account = client.accounts.create(
                name="Account #2840 - DT Precision Auto",
            )
            print(account.id)
        - lang: Ruby
          source: >-
            require "surge_api"


            surge = SurgeAPI::Client.new(api_key: "My API Key")


            account = surge.accounts.create(name: "Account #2840 - DT Precision
            Auto")


            puts(account)
  /accounts/{account_id}/audiences:
    post:
      description: Creates a new audience.
      operationId: CreateAudience
      parameters:
        - in: path
          name: account_id
          required: true
          schema:
            description: The account for which the audience should be created.
            example: acct_01j9a43avnfqzbjfch6pygv1td
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AudienceCreateParams'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Audience'
          description: Created audience
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error
      summary: Create an audience
      tags:
        - Audiences
      x-codeSamples:
        - lang: JavaScript
          source: >-
            import Surge from '@surgeapi/node';


            const client = new Surge({
              apiKey: process.env['SURGE_API_KEY'], // This is the default and can be omitted
            });


            const audience = await
            client.audiences.create('acct_01j9a43avnfqzbjfch6pygv1td', {
              name: 'The Family',
            });


            console.log(audience.id);
        - lang: Python
          source: |-
            import os
            from surge import Surge

            client = Surge(
                api_key=os.environ.get("SURGE_API_KEY"),  # This is the default and can be omitted
            )
            audience = client.audiences.create(
                account_id="acct_01j9a43avnfqzbjfch6pygv1td",
                name="The Family",
            )
            print(audience.id)
        - lang: Ruby
          source: >-
            require "surge_api"


            surge = SurgeAPI::Client.new(api_key: "My API Key")


            audience = surge.audiences.create("acct_01j9a43avnfqzbjfch6pygv1td",
            name: "The Family")


            puts(audience)
  /accounts/{account_id}/blasts:
    post:
      description: Sends a Blast.
      operationId: SendBlast
      parameters:
        - in: path
          name: account_id
          required: true
          schema:
            description: The account for which the blast should be sent.
            example: acct_01j9a43avnfqzbjfch6pygv1td
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlastParams'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Blast'
          description: Created blast
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error
      summary: Send a blast
      tags:
        - Blasts
      x-codeSamples:
        - lang: JavaScript
          source: >-
            import Surge from '@surgeapi/node';


            const client = new Surge({
              apiKey: process.env['SURGE_API_KEY'], // This is the default and can be omitted
            });


            const blast = await
            client.blasts.create('acct_01j9a43avnfqzbjfch6pygv1td');


            console.log(blast.id);
        - lang: Python
          source: |-
            import os
            from surge import Surge

            client = Surge(
                api_key=os.environ.get("SURGE_API_KEY"),  # This is the default and can be omitted
            )
            blast = client.blasts.create(
                account_id="acct_01j9a43avnfqzbjfch6pygv1td",
            )
            print(blast.id)
        - lang: Ruby
          source: |-
            require "surge_api"

            surge = SurgeAPI::Client.new(api_key: "My API Key")

            blast = surge.blasts.create("acct_01j9a43avnfqzbjfch6pygv1td")

            puts(blast)
  /accounts/{account_id}/campaigns:
    get:
      description: List all campaigns for an account with cursor-based pagination.
      operationId: ListCampaigns
      parameters:
        - in: path
          name: account_id
          required: true
          schema:
            description: The account ID to list campaigns for.
            example: acct_01j9a43avnfqzbjfch6pygv1td
            type: string
        - in: query
          name: after
          required: false
          schema:
            description: >-
              Cursor for forward pagination. Use the next_cursor from a previous
              response.
            type: string
        - in: query
          name: before
          required: false
          schema:
            description: >-
              Cursor for backward pagination. Use the previous_cursor from a
              previous response.
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignList'
          description: List of campaigns
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error
      summary: List campaigns
      tags:
        - Campaigns
      x-codeSamples:
        - lang: JavaScript
          source: >-
            import Surge from '@surgeapi/node';


            const client = new Surge({
              apiKey: process.env['SURGE_API_KEY'], // This is the default and can be omitted
            });


            // Automatically fetches more pages as needed.

            for await (const campaign of
            client.campaigns.list('acct_01j9a43avnfqzbjfch6pygv1td')) {
              console.log(campaign.id);
            }
        - lang: Python
          source: |-
            import os
            from surge import Surge

            client = Surge(
                api_key=os.environ.get("SURGE_API_KEY"),  # This is the default and can be omitted
            )
            page = client.campaigns.list(
                account_id="acct_01j9a43avnfqzbjfch6pygv1td",
            )
            page = page.data[0]
            print(page.id)
        - lang: Ruby
          source: |-
            require "surge_api"

            surge = SurgeAPI::Client.new(api_key: "My API Key")

            page = surge.campaigns.list("acct_01j9a43avnfqzbjfch6pygv1td")

            puts(page)
    post:
      description: Creates a campaign to register account to send text messages.
      operationId: CreateCampaign
      parameters:
        - in: path
          name: account_id
          required: true
          schema:
            description: The account for which the campaign should be created.
            example: acct_01j9a43avnfqzbjfch6pygv1td
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignParams'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'
          description: Created campaign
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error
      summary: Create a campaign
      tags:
        - Campaigns
      x-codeSamples:
        - lang: JavaScript
          source: >-
