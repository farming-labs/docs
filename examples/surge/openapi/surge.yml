  /verifications/{id}/checks:
    post:
      description: Checks the code against a verification.
      operationId: CheckVerification
      parameters:
        - in: path
          name: id
          required: true
          schema:
            description: The ID of the verification to check against.
            example: vfn_01jayh15c2f2xamftg0xpyq1nj
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerificationCheckParams'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationCheck'
          description: Correct code
        '409':
          content:
            application/json:
              examples:
                Already verified:
                  value:
                    result: already_verified
              schema:
                $ref: '#/components/schemas/VerificationCheck'
          description: Already verified
        '422':
          content:
            application/json:
              examples:
                Exhausted:
                  value:
                    result: incorrect
                    verification:
                      attempt_count: 3
                      id: vfn_01jayh15c2f2xamftg0xpyq1nj
                      phone_number: '+18015551234'
                      status: exhausted
                Expired:
                  value:
                    result: expired
                    verification:
                      attempt_count: 0
                      id: vfn_01jayh15c2f2xamftg0xpyq1nj
                      phone_number: '+18015551234'
                      status: expired
                Incorrect:
                  value:
                    result: incorrect
                    verification:
                      attempt_count: 1
                      id: vfn_01jayh15c2f2xamftg0xpyq1nj
                      phone_number: '+18015551234'
                      status: pending
              schema:
                $ref: '#/components/schemas/VerificationCheck'
          description: Check failed
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error
      summary: Check a verification
      tags:
        - Verifications
      x-codeSamples:
        - lang: JavaScript
          source: >-
            import Surge from '@surgeapi/node';


            const client = new Surge({
              apiKey: process.env['SURGE_API_KEY'], // This is the default and can be omitted
            });


            const verificationCheck = await
            client.verifications.check('vfn_01jayh15c2f2xamftg0xpyq1nj', {
              code: '123456',
            });


            console.log(verificationCheck.result);
        - lang: Python
          source: |-
            import os
            from surge import Surge

            client = Surge(
                api_key=os.environ.get("SURGE_API_KEY"),  # This is the default and can be omitted
            )
            verification_check = client.verifications.check(
                id="vfn_01jayh15c2f2xamftg0xpyq1nj",
                code="123456",
            )
            print(verification_check.result)
        - lang: Ruby
          source: >-
            require "surge_api"


            surge = SurgeAPI::Client.new(api_key: "My API Key")


            verification_check =
            surge.verifications.check("vfn_01jayh15c2f2xamftg0xpyq1nj", code:
            "123456")


            puts(verification_check)
security:
  - authorization: []
servers:
  - url: https://api.surge.app
webhooks:
  callEnded:
    post:
      description: >-
        The `call.ended` event is delivered whenever a call is completed between
        a Surge number you own and another phone number.
      operationId: callEnded
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CallEndedEvent'
      responses:
        '200':
          description: >-
            Return a 200 status to indicate that the data was received
            successfully
  campaignApproved:
    post:
      description: >-
        The `campaign.approved` event is delivered whenever a campaign is
        approved by all of the US carriers and able to start sending text
        messages.
      operationId: campaignApproved
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignApprovedEvent'
      responses:
        '200':
          description: >-
            Return a 200 status to indicate that the data was received
            successfully
  contactOptedIn:
    post:
      description: >-
        The `contact.opted_in` event is delivered whenever a contact opts back
        in to receiving messages by sending a keyword message (START, YES,
        UNSTOP).
      operationId: contactOptedIn
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactOptedInEvent'
      responses:
        '200':
          description: >-
            Return a 200 status to indicate that the data was received
            successfully
  contactOptedOut:
    post:
      description: >-
        The `contact.opted_out` event is delivered whenever a contact opts out
        of receiving messages by sending a keyword message (STOP, CANCEL,
        UNSUBSCRIBE, etc.).
      operationId: contactOptedOut
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactOptedOutEvent'
      responses:
        '200':
          description: >-
            Return a 200 status to indicate that the data was received
            successfully
  conversationCreated:
    post:
      description: >-
        The `conversation.created` event is delivered whenever a new
        conversation is started with a contact. This could be when either the
        contact sends a message to your Surge number or when you create a
        conversation, whether by sending an initial message to the contact or by
        manually creating the conversation using the API.
      operationId: conversationCreated
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationCreatedEvent'
      responses:
        '200':
          description: >-
            Return a 200 status to indicate that the data was received
            successfully
  linkFollowed:
    post:
      description: >-
        The `link.followed` event is delivered when a contact first follows a
        shortened link that was included in a message sent from a Surge number.
        This event is only triggered on the first click of each link; subsequent
        clicks on the same link do not generate additional events.
      operationId: linkFollowed
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinkFollowedEvent'
      responses:
        '200':
          description: >-
            Return a 200 status to indicate that the data was received
            successfully
  messageDelivered:
    post:
      description: >-
        The `message.delivered` event is delivered whenever a message sent from
        a Surge number is successfully delivered to the recipient. When the
        message is sent from a short code or toll-free number, this means that
        the message arrived on the recipient's device. When sent from a local
        number, this means that the message was successfully handed off to the
        recipient's mobile carrier, but does not guarantee that it arrived on
        the recipient's device.
      operationId: messageDelivered
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageDeliveredEvent'
      responses:
        '200':
          description: >-
            Return a 200 status to indicate that the data was received
            successfully
  messageFailed:
    post:
      description: >-
        The `message.failed` event is delivered whenever a message sent from
        your Surge number fails to be delivered.
      operationId: messageFailed
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageFailedEvent'
      responses:
        '200':
          description: >-
            Return a 200 status to indicate that the data was received
            successfully
  messageReceived:
    post:
      description: >-
        The `message.received` event is delivered whenever a message is received
        at a Surge number from a contact.
      operationId: messageReceived
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageReceivedEvent'
      responses:
        '200':
          description: >-
            Return a 200 status to indicate that the data was received
            successfully
  messageSent:
    post:
      description: >-
        The `message.sent` event is delivered whenever a message is sent from a
        Surge number to a contact.
      operationId: messageSent
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageSentEvent'
      responses:
        '200':
          description: >-
            Return a 200 status to indicate that the data was received
            successfully
  phoneNumberAttachedToCampaign:
    post:
      description: >-
        The `phone_number.attached_to_campaign` event is delivered whenever a
        phone number is attached to a campaign.
      operationId: phoneNumberAttachedToCampaign
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneNumberAttachedToCampaignEvent'
      responses:
        '200':
          description: >-
            Return a 200 status to indicate that the data was received
            successfully
  recordingCompleted:
    post:
      description: >-
        The `recording.completed` event is delivered whenever a call recording
        has been processed and is ready for playback. This event is not
        triggered for voicemail recordings.
      operationId: recordingCompleted
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordingCompletedEvent'
      responses:
        '200':
          description: >-
            Return a 200 status to indicate that the data was received
            successfully
  voicemailReceived:
    post:
      description: >-
        The `voicemail.received` event is delivered whenever a voicemail
        recording has been processed and is ready for playback.
      operationId: voicemailReceived
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoicemailReceivedEvent'
      responses:
        '200':
          description: >-
            Return a 200 status to indicate that the data was received
            successfully
