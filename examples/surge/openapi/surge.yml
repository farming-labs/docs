    VerificationCheck:
      description: The result of checking a Verification code
      example:
        result: ok
        verification:
          attempt_count: 1
          id: vfn_01jayh15c2f2xamftg0xpyq1nj
          phone_number: '+18015551234'
          status: verified
      properties:
        result:
          description: The result of the code check.
          enum:
            - ok
