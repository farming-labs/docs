components:
  schemas:
    User:
      description: A user of the app
      example:
        first_name: Brian
        id: usr_01j9dwavghe1ttppewekjjkfrx
        last_name: O'Conner
        metadata:
          email: boconner@toretti.family
          user_id: '1234'
        photo_url: https://toretti.family/people/brian.jpg
      properties:
        first_name:
          description: The user's first name.
          type: string
        id:
          description: Unique identifier for the object.
          type: string
        last_name:
          description: The user's last name.
          type: string
        metadata:
          $ref: '#/components/schemas/Metadata'
        photo_url:
          description: URL of a photo to be used as the user's avatar.
          format: uri
          type: string
      required:
        - first_name
      title: User
      type: object
    VoicemailReceivedEvent:
      description: ''
      example:
        account_id: acct_01japd271aeatb7txrzr2xj8sg
        data:
          call:
            contact:
              email: dom@toretto.family
              first_name: Dominic
              id: ctc_01ja88cboqffhswjx8zbak3ykk
              last_name: Toretto
              metadata:
                car: 1970 Dodge Charger R/T
              phone_number: '+18015551234'
            duration: 184
            id: call_01jjnn7s0zfx5tdcsxjfy93et2
            initiated_at: '2025-03-31T21:01:37Z'
            status: completed
          duration: 124
          id: vml_01kfycac7rery81axwmpzcgpp8
          recording_id: rec_01kfyc9dgdec1avkgs7tng8htg
        timestamp: '2024-10-21T23:29:41Z'
        type: voicemail.received
      properties:
        account_id:
          description: The ID of the account in which this event occurred
          type: string
        data:
          description: The data associated with the event
          properties:
            call:
              description: The call that resulted in this voicemail
              properties:
                contact:
                  $ref: '#/components/schemas/Contact'
                duration:
                  description: The duration of the call in seconds
                  type: integer
                id:
                  description: The unique identifier for the call
                  type: string
                initiated_at:
                  description: When the call was initiated
                  format: date-time
                  type: string
                status:
                  description: The status of the call
                  enum:
                    - busy
                    - canceled
                    - completed
                    - failed
                    - in_progress
                    - missed
                    - no_answer
                    - queued
                    - ringing
                  type: string
              required:
                - id
                - contact
                - duration
                - initiated_at
                - status
              type: object
            duration:
              description: The duration of the voicemail in seconds
              type: integer
            id:
              description: The unique identifier for the voicemail
              type: string
            recording_id:
              description: The unique identifier for the recording
              type: string
          required:
            - id
            - recording_id
            - duration
            - call
          type: object
        timestamp:
          description: The timestamp when this event occurred, in ISO8601 format
          format: date-time
          type: string
        type:
          const: voicemail.received
          description: The type of the event. Always `voicemail.received` for this event.
          type: string
      required:
        - account_id
        - data
        - timestamp
        - type
      title: VoicemailReceivedEvent
      type: object
    UserParams:
      description: POST body for creating a user
      example:
        first_name: Brian
        last_name: O'Conner
        metadata:
          email: boconner@toretti.family
          user_id: '1234'
        photo_url: https://toretti.family/people/brian.jpg
      properties:
        first_name:
          description: The user's first name.
          type: string
        last_name:
          description: The user's last name.
          type: string
        metadata:
          $ref: '#/components/schemas/Metadata'
        photo_url:
          description: URL of a photo to be used as the user's avatar.
          format: uri
          type: string
      required:
        - first_name
      title: UserParams
      type: object
    TokenParams:
      description: A request to create a token
      example:
        duration_seconds: 900
      properties:
        duration_seconds:
          description: >-
            For how many seconds the token should be accepted. Defaults to 15
            minutes.
          example: 900
          maximum: 3600
          minimum: 15
          type: integer
      title: TokenParams
      type: object
    Blast:
      description: A Blast is a message sent to multiple recipients at once.
      example:
        attachments:
          - url: https://example.com/image.jpg
        body: Join us for our grand opening!
        id: bst_01j9dy8mdzfn3r0e8x1tbdrdrf
        name: Grand Opening Announcement
        send_at: '2024-02-01T15:00:00Z'
      properties:
        attachments:
          items:
            properties:
              url:
                description: The URL of the attachment.
                type: string
            type: object
          type: array
        body:
          description: The message body.
          type:
            - string
            - 'null'
        id:
          description: Unique identifier for the object.
          type: string
        name:
          description: Optional name for the blast.
          type: string
        send_at:
          description: When the blast will be or was sent.
          format: date-time
          type: string
      title: Blast
      type: object
    ConversationPhoneNumber:
      description: This is the phone number tied to the Surge account.
      example:
        id: pn_01jsjwe4d9fx3tpymgtg958d9w
        name: (801) 555-1234
        number: '+18015551234'
        type: local
      properties:
        id:
          description: Unique identifier for the phone number
          type: string
        name:
          description: A human-readable name for the phone number
          type:
            - string
            - 'null'
        number:
          description: The canonical format of the phone number.
          example: '+18015551234'
          format: phone-number
          pattern: ^\+[1-9]\d{6,14}$|^\d{5,6}$
          type: string
        type:
          description: Whether the phone number is local, toll-free, or short code
          enum:
            - local
            - toll_free
            - short_code
            - demo
          type: string
      required:
        - id
        - name
        - number
        - type
      title: ConversationPhoneNumber
      type: object
    MessageFailedEvent:
      description: ''
      example:
        account_id: acct_01japd271aeatb7txrzr2xj8sg
        data:
          attachments: []
          blast_id: null
          body: Dude, I almost had you!
          conversation:
            contact:
              first_name: Dominic
              id: ctc_01ja88cboqffhswjx8zbak3ykk
              last_name: Toretto
              phone_number: '+18015551234'
            id: cnv_01jav8xy7fe4nsay3c9deqxge9
            phone_number:
              campaign_id: cpn_01jjnn7s0zfx5tdcsxjfy93et2
              id: pn_01jsjwe4d9fx3tpymgtg958d9w
              name: (801) 555-6789
              number: '+18015556789'
              type: local
          failed_at: '2024-10-21T23:29:42Z'
          failure_reason: carrier_error
          id: msg_01jjnn7s0zfx5tdcsxjfy93et2
          metadata:
            order_id: '12345'
        timestamp: '2024-10-21T23:29:41Z'
        type: message.failed
      properties:
        account_id:
          description: The ID of the account in which this event occurred
          type: string
        data:
          description: The data associated with the event
          properties:
            attachments:
              description: Attachments included with the message
              items:
                properties:
                  id:
                    description: The unique identifier for the attachment
                    type: string
                  type:
                    description: The type of attachment
                    enum:
                      - file
                      - image
                      - link
                      - video
                    type: string
                  url:
                    description: The URL to download the attachment
                    type: string
                required:
                  - id
                  - type
                  - url
                type: object
              type: array
            blast_id:
              description: >-
                The ID of the blast this message belongs to, if any. This can be
                used to attribute messages back to a specific blast.
              type: string
            body:
              description: The content of the message
              type:
                - string
                - 'null'
            conversation:
              description: The conversation this message belongs to
              properties:
                contact:
                  $ref: '#/components/schemas/Contact'
                id:
                  description: The unique identifier for the conversation
                  type: string
                phone_number:
                  $ref: '#/components/schemas/PhoneNumber'
              required:
                - id
                - phone_number
                - contact
              type: object
            failed_at:
              description: When the message failed
              format: date-time
              type: string
            failure_reason:
              description: The reason the message failed to be delivered
              type: string
            id:
              description: The unique identifier for the message
              type: string
            metadata:
              $ref: '#/components/schemas/Metadata'
          required:
            - id
            - body
            - metadata
            - failed_at
            - failure_reason
            - conversation
          type: object
        timestamp:
          description: The timestamp when this event occurred, in ISO8601 format
          format: date-time
          type: string
        type:
          const: message.failed
          description: The type of the event. Always `message.failed` for this event.
          type: string
      required:
        - account_id
        - data
        - timestamp
        - type
      title: MessageFailedEvent
      type: object
    AccountUpdateParams:
      description: Parameters for updating an existing account.
      example:
        brand_name: DT Precision Auto
        name: D·T Precision Auto Shop
        organization:
          address:
            country: US
            line1: 2640 Huron St
            line2: null
            locality: Los Angeles
            name: DT Precision Auto
            postal_code: '90065'
            region: CA
          contact:
            email: dom@dtprecisionauto.com
            first_name: Dominic
            last_name: Toretto
            phone_number: '+13235556439'
            title: other
            title_other: Owner
          country: US
          email: dom@dtprecisionauto.com
          identifier: '123456789'
          identifier_type: ein
          industry: automotive
          mobile_number: '+13235556439'
          regions_of_operation:
            - usa_and_canada
          registered_name: DT Precision Auto LLC
          stock_exchange: null
          stock_symbol: null
          type: llc
          website: https://dtprecisionauto.com
        time_zone: America/Los_Angeles
      properties:
        brand_name:
          description: >-
            The name by which the people this account communicates with know it.
            If not provided, this will match the name field.
          type: string
        name:
          description: >-
            The name of the account that will be visible for your internal
            organizational purposes. This will also be the default public-facing
            brand name unless you also set a `brand_name`, but otherwise the
            account name will never be displayed anywhere outside of Surge HQ,
            and may include your ID for the account or anything else that may
            help you.
          type: string
        organization:
          $ref: '#/components/schemas/OrganizationParams'
        time_zone:
          description: The time zone for the account
          example: America/Los_Angeles
          nullable: true
          type: string
      required: []
      title: AccountUpdateParams
      type: object
    CampaignList:
      description: A paginated list of campaigns
      properties:
        data:
          description: The list of campaigns
          items:
            $ref: '#/components/schemas/Campaign'
          type: array
        pagination:
          $ref: '#/components/schemas/Pagination'
      required:
        - data
        - pagination
      title: CampaignList
      type: object
    Verification:
      description: A phone number verification
      example:
        attempt_count: 0
        id: vfn_01jayh15c2f2xamftg0xpyq1nj
        phone_number: '+18015551234'
        status: pending
      properties:
        attempt_count:
          description: The number of times the code has been attempted.
          type: integer
        id:
          description: Unique identifier for the object.
          type: string
        phone_number:
          description: The phone number being verified. In E.164 format.
          example: '+18015551234'
          format: phone-number
          pattern: ^\+[1-9]\d{6,14}$
          type: string
        status:
          description: The current status of the verification.
          enum:
            - pending
            - verified
            - exhausted
            - expired
          type: string
      required:
        - id
        - attempt_count
        - phone_number
        - status
      title: Verification
      type: object
    ConversationParams:
      description: >-
        Params for selecting or creating a new conversation. Either the id or
        the Contact must be given.
      example:
        contact:
          first_name: Dominic
          last_name: Toretto
          phone_number: '+18015551234'
        phone_number: '+18015556789'
      properties:
        contact:
          $ref: '#/components/schemas/ContactParams'
        phone_number:
          description: >-
            The phone number from which to send the message. This can be either
            the phone number in E.164 format or a Surge phone number id.
          example: '+18015552345'
          pattern: ^\+[1-9]\d{6,14}$|^\d{5,6}$|^pn_[[:alnum:]]{26}$
          type: string
      required:
        - contact
      title: ConversationParams
      type: object
    PhoneNumberList:
      description: A paginated list of phone numbers
      example:
        data:
          - campaign_id: null
            id: pn_01jsjwe4d9fx3tpymgtg958d9w
            name: (801) 555-1234
            number: '+18015551234'
            type: local
        pagination:
          next_cursor: null
          previous_cursor: null
      properties:
        data:
          description: The list of phone numbers
          items:
            $ref: '#/components/schemas/PhoneNumber'
          type: array
        pagination:
          $ref: '#/components/schemas/Pagination'
      required:
        - data
        - pagination
      title: PhoneNumberList
      type: object
    TokenResponse:
      description: Response when token has been created successfully
      example:
        token: >-
          eyJhbGciOiJFZERTQSIsImtpZCI6InNnbl8wMWp5bWowZ3AwZjNidmJmMmpyazRoYnd0ayIsInR5cCI6IkpXVCJ9.eyJleHAiOjE3NTA4ODkyMDgsInN1YiI6InVzcl8wMWp5bWdkZnJwZWMyYXNjNW0wejNhNmZyOSJ9.zKayo3EDrUm1Hw8URrofuYwajgyTu6dH2H0FEuRExprP1IV66FHa8wC3SfdzV7sR3AjDGAwkuAXztScq6rBnBw
      properties:
        token:
          description: The created token.
          type: string
      title: TokenResponse
      type: object
    Error:
      description: An error response
      example:
        message: The requested resource was not found.
        type: not_found
      properties:
        detail:
          additionalProperties: true
          description: Additional details about the error.
          type: object
        message:
          description: A human-readable error message.
          example: The requested resource was not found.
          type: string
        type:
          description: A unique error code.
          example: not_found
          type: string
      required:
        - type
        - message
      title: Error
      type: object
    ContactList:
      description: A paginated list of contacts
      example:
        data:
          - email: dom@toretto.family
            first_name: Dominic
            id: ctc_01j9dy8mdzfn3r0e8x1tbdrdrf
            last_name: Toretto
            metadata:
              car: 1970 Dodge Charger R/T
            phone_number: '+18015551234'
        pagination:
          next_cursor: null
          previous_cursor: null
      properties:
        data:
          description: The list of contacts
          items:
            $ref: '#/components/schemas/Contact'
          type: array
        pagination:
          $ref: '#/components/schemas/Pagination'
      required:
        - data
        - pagination
      title: ContactList
      type: object
    Attachment:
      description: An Attachment is a file that can be sent with a message.
      example:
        id: att_01j9e0m1m6fc38gsv2vkfqgzz2
        type: image
        url: https://api.surge.app/attachments/att_01jbwyqj7rejzat7pq03r7fgmf
      properties:
        id:
          description: Unique identifier for the object.
          type: string
        type:
          description: The type of attachment.
          enum:
            - file
            - image
            - link
            - video
          type: string
        url:
          description: The URL of the attachment.
          type: string
      title: Attachment
      type: object
    CampaignApprovedEvent:
      description: ''
      example:
        account_id: acct_01japd271aeatb7txrzr2xj8sg
        data:
          id: cpn_01jjnn7s0zfx5tdcsxjfy93et2
          status: active
        timestamp: '2024-10-21T23:29:41Z'
        type: campaign.approved
      properties:
        account_id:
          description: The ID of the account in which this event occurred
          type: string
        data:
          description: The data associated with the event
          properties:
            id:
              description: The unique identifier for the campaign
              type: string
            status:
              description: >-
                The status of the campaign. Will always be `active` for this
                event.
              enum:
                - active
              type: string
          required:
            - id
            - status
          type: object
        timestamp:
          description: The timestamp when this event occurred, in ISO8601 format
          format: date-time
          type: string
        type:
          const: campaign.approved
          description: The type of the event. Always `campaign.approved` for this event.
          type: string
      required:
        - account_id
        - data
        - timestamp
        - type
      title: CampaignApprovedEvent
      type: object
    ContactOptedInEvent:
      description: ''
      example:
        account_id: acct_01japd271aeatb7txrzr2xj8sg
        data:
          id: ctc_01ja88cboqffhswjx8zbak3ykk
        timestamp: '2024-10-21T23:29:41Z'
        type: contact.opted_in
      properties:
        account_id:
          description: The ID of the account in which this event occurred
          type: string
        data:
          description: The data associated with the event
          properties:
            id:
              description: The unique identifier for the contact
              type: string
          required:
            - id
          type: object
        timestamp:
          description: The timestamp when this event occurred, in ISO8601 format
          format: date-time
          type: string
        type:
          const: contact.opted_in
          description: The type of the event. Always `contact.opted_in` for this event.
          type: string
      required:
        - account_id
        - data
        - timestamp
        - type
      title: ContactOptedInEvent
      type: object
    PhoneNumberAttachedToCampaignEvent:
      description: ''
      example:
        account_id: acct_01japd271aeatb7txrzr2xj8sg
        data:
          campaign_id: cpn_01jjnn7s0zfx5tdcsxjfy93et2
          id: pn_01jsjwe4d9fx3tpymgtg958d9w
          name: (801) 555-1234
          number: '+18015551234'
          type: local
        timestamp: '2024-10-21T23:29:41Z'
        type: phone_number.attached_to_campaign
      properties:
        account_id:
          description: The ID of the account in which this event occurred
          type: string
        data:
          description: The data associated with the event
          properties:
            campaign_id:
              description: >-
                The unique identifier of the campaign this phone number is
                attached to
              type: string
            id:
              description: The unique identifier for the phone number
              type: string
            name:
              description: A human-readable name for the phone number
              type:
                - string
                - 'null'
            number:
              description: The phone number in E.164 format
              type: string
            type:
              description: Whether the phone number is local, toll-free, or short code
              enum:
                - local
                - short_code
                - toll_free
              type: string
          required:
            - id
            - name
            - number
            - type
            - campaign_id
          type: object
        timestamp:
          description: The timestamp when this event occurred, in ISO8601 format
          format: date-time
          type: string
        type:
          const: phone_number.attached_to_campaign
          description: >-
            The type of the event. Always `phone_number.attached_to_campaign`
            for this event.
          type: string
      required:
        - account_id
        - data
        - timestamp
        - type
      title: PhoneNumberAttachedToCampaignEvent
      type: object
    ConversationCreatedEvent:
      description: ''
      example:
        account_id: acct_01japd271aeatb7txrzr2xj8sg
        data:
          contact:
            first_name: Dominic
            id: ctc_01ja88cboqffhswjx8zbak3ykk
            last_name: Toretto
            phone_number: '+18015551234'
          id: cnv_01jav8xy7fe4nsay3c9deqxge9
          phone_number:
            campaign_id: null
            id: pn_01jsjwe4d9fx3tpymgtg958d9w
            name: (801) 555-6789
            number: '+18015556789'
            type: local
        timestamp: '2024-10-21T23:29:41Z'
        type: conversation.created
      properties:
        account_id:
          description: The ID of the account in which this event occurred
          type: string
        data:
          description: The data associated with the event
          properties:
            contact:
              $ref: '#/components/schemas/Contact'
            id:
              description: The unique identifier for the conversation
              type: string
            phone_number:
              $ref: '#/components/schemas/PhoneNumber'
          required:
            - id
            - phone_number
            - contact
          type: object
        timestamp:
          description: The timestamp when this event occurred, in ISO8601 format
          format: date-time
          type: string
        type:
          const: conversation.created
          description: The type of the event. Always `conversation.created` for this event.
          type: string
      required:
        - account_id
        - data
        - timestamp
        - type
      title: ConversationCreatedEvent
      type: object
    MessageDeliveredEvent:
      description: ''
      example:
        account_id: acct_01japd271aeatb7txrzr2xj8sg
        data:
          attachments:
            - id: att_01jjnn75vgepj8bnnttfw1st5s
              type: image
              url: https://toretto.family/skyline.jpg
          blast_id: null
          body: Dude, I almost had you!
          conversation:
            contact:
              email: dom@toretto.family
              first_name: Dominic
              id: ctc_01ja88cboqffhswjx8zbak3ykk
              last_name: Toretto
              metadata:
                car: 1970 Dodge Charger R/T
              phone_number: '+18015551234'
            id: cnv_01jav8xy7fe4nsay3c9deqxge9
            phone_number:
              campaign_id: cpn_01jjnn7s0zfx5tdcsxjfy93et2
              id: pn_01jsjwe4d9fx3tpymgtg958d9w
              name: (801) 555-6789
              number: '+18015556789'
              type: local
          delivered_at: '2024-10-21T23:29:42Z'
          id: msg_01jjnn7s0zfx5tdcsxjfy93et2
          metadata:
            order_id: '12345'
        timestamp: '2024-10-21T23:29:41Z'
        type: message.delivered
      properties:
        account_id:
          description: The ID of the account in which this event occurred
          type: string
        data:
          description: The data associated with the event
          properties:
            attachments:
              description: Attachments included with the message
              items:
                properties:
                  id:
                    description: The unique identifier for the attachment
                    type: string
                  type:
                    description: The type of attachment
                    enum:
                      - file
                      - image
                      - link
                      - video
                    type: string
                  url:
                    description: The URL where the attachment can be downloaded
                    type: string
                required:
                  - id
                  - type
                  - url
                type: object
              type: array
            blast_id:
              description: >-
                The ID of the blast this message belongs to, if any. This can be
                used to attribute messages back to a specific blast.
              type: string
            body:
              description: The content of the message
              type:
                - string
                - 'null'
            conversation:
              description: The conversation this message belongs to
              properties:
                contact:
                  $ref: '#/components/schemas/Contact'
                id:
                  description: The unique identifier for the conversation
                  type: string
                phone_number:
                  $ref: '#/components/schemas/PhoneNumber'
              required:
                - id
                - phone_number
                - contact
              type: object
            delivered_at:
              description: When the message was delivered
              format: date-time
              type: string
            id:
              description: The unique identifier for the message
              type: string
            metadata:
              $ref: '#/components/schemas/Metadata'
          required:
            - id
            - body
            - metadata
            - delivered_at
            - conversation
          type: object
        timestamp:
          description: The timestamp when this event occurred, in ISO8601 format
          format: date-time
          type: string
        type:
          const: message.delivered
          description: The type of the event. Always `message.delivered` for this event.
          type: string
      required:
        - account_id
        - data
        - timestamp
        - type
      title: MessageDeliveredEvent
      type: object
    Conversation:
