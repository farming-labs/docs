        downloaded. URL is short-lived, so redirect should be followed
        immediately.
      operationId: GetRecordingFile
      parameters:
        - in: path
          name: recording_id
          required: true
          schema:
            description: The ID of the recording.
            example: rec_01kfyc9dgdec1avkgs7tng8htg
            type: string
      responses:
        '302':
          content: {}
          description: Redirect to the recording file
          headers:
            Location:
              description: Signed URL to download the recording file
              schema:
                format: uri
                type: string
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error
